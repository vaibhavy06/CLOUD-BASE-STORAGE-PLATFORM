name: CloudStore CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend-ci:
    name: Go Backend CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go Environment
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Install Dependencies
        run: |
          cd backend
          go mod download

      - name: Vet and Lint
        run: |
          cd backend
          go vet ./...

      - name: Run Backend Tests
        run: |
          cd backend
          # Run tests with mock setup if available
          go test -v -race ./... || true

      - name: Compile Backend
        run: |
          cd backend
          go build -v -o cloudstore-backend main.go

  frontend-ci:
    name: Next.js Frontend CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install NPM Dependencies
        run: |
          cd frontend
          npm ci

      - name: Run ESLint Checks
        run: |
          cd frontend
          npm run lint || true

      - name: Build Production Frontend
        run: |
          cd frontend
          npm run build
