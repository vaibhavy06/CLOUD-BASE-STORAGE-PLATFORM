version: '3.8'

services:
  # Database Layer
  postgres:
    image: postgres:15-alpine
    container_name: cloudstore_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
      POSTGRES_DB: cloudstore
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d cloudstore"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Caching and Rate Limiting
  redis:
    image: redis:7-alpine
    container_name: cloudstore_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Object Storage
  minio:
    image: minio/minio
    container_name: cloudstore_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # Web Console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadminpassword
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Local AI Server
  ollama:
    image: ollama/ollama:latest
    container_name: cloudstore_ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  # Monitoring: Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: cloudstore_prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"

  # Logging: Grafana Loki
  loki:
    image: grafana/loki:latest
    container_name: cloudstore_loki
    restart: unless-stopped
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"

  # Dashboards: Grafana
  grafana:
    image: grafana/grafana:latest
    container_name: cloudstore_grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    ports:
      - "3001:3000" # Map to 3001 as requested
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana:/etc/grafana/provisioning
    depends_on:
      - prometheus
      - loki

  # Log collector: Promtail
  promtail:
    image: grafana/promtail:latest
    container_name: cloudstore_promtail
    restart: unless-stopped
    volumes:
      - ./monitoring/promtail-config.yaml:/etc/promtail/config.yml
      - backend_logs:/var/log
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki

  # Backend Service (Built from local folder)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cloudstore_backend
    restart: unless-stopped
    ports:
      - "8081:8080"
    volumes:
      - backend_logs:/app/logs
    environment:
      - PORT=8080
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=admin
      - DB_PASSWORD=adminpassword
      - DB_NAME=cloudstore
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadminpassword
      - OLLAMA_HOST=http://ollama:11434
      - JWT_SECRET=supersecretsigningkey123!
      - LOG_PATH=/app/logs/backend.log
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  # Frontend Service (Built from local folder)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:8081
        - NEXT_PUBLIC_GOOGLE_CLIENT_ID=${NEXT_PUBLIC_GOOGLE_CLIENT_ID:-}
    container_name: cloudstore_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8081
      - NEXT_PUBLIC_GOOGLE_CLIENT_ID=${NEXT_PUBLIC_GOOGLE_CLIENT_ID:-}
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  minio_data:
  ollama_data:
  prometheus_data:
  grafana_data:
  backend_logs:
